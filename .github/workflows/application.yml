name: Application

concurrency:
  group: aca-application-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/application.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Scan
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      security-events: write

    env:
      ACR_SERVER: acrnginxacadev.azurecr.io
      IMAGE_NAME: nginx-aca/web

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image_tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to dev ACR
        run: az acr login --name acrnginxacadev

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_SERVER/$IMAGE_NAME:${{ steps.image_tag.outputs.tag }} \
            -t $ACR_SERVER/$IMAGE_NAME:latest \
            app/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: acrnginxacadev.azurecr.io/nginx-aca/web:${{ steps.image_tag.outputs.tag }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif

      - name: Push Docker image to dev ACR
        run: |
          docker push $ACR_SERVER/$IMAGE_NAME:${{ steps.image_tag.outputs.tag }}
          docker push $ACR_SERVER/$IMAGE_NAME:latest

  deploy-dev:
    name: Deploy — dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    env:
      APP_NAME: ca-nginx-aca-dev
      RESOURCE_GROUP: rg-main-nginx-aca-dev
      ACR_SERVER: acrnginxacadev.azurecr.io
      IMAGE_NAME: nginx-aca/web

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current active revision
        id: previous_revision
        run: |
          previous=$(az containerapp revision list \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "[?properties.trafficWeight > \`0\`].name" -o tsv | head -n1)
          echo "name=$previous" >> $GITHUB_OUTPUT
          echo "Previous active revision: $previous"

      - name: Configure ACR registry on Container App
        run: |
          az containerapp registry set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --server $ACR_SERVER \
            --identity system

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_SERVER/$IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
            --revision-suffix ${{ needs.build.outputs.image_tag }}

      - name: Get latest revision name
        id: latest_revision
        run: |
          revision=$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "name=$revision" >> $GITHUB_OUTPUT
          echo "Latest revision: $revision"

      - name: Get new revision FQDN
        id: revision_fqdn
        run: |
          fqdn=$(az containerapp revision show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --revision ${{ steps.latest_revision.outputs.name }} \
            --query "properties.fqdn" -o tsv)
          echo "fqdn=$fqdn" >> $GITHUB_OUTPUT

      - name: Wait for revision to start
        run: sleep 60

      - name: Smoke test new revision
        run: |
          url="https://${{ steps.revision_fqdn.outputs.fqdn }}"
          echo "Testing $url"
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Smoke test passed — HTTP $status"
              exit 0
            fi
            echo "Attempt $i — HTTP $status, retrying in 30s"
            sleep 30
          done
          echo "Smoke test failed after 10 attempts"
          exit 1

      - name: Shift 20% traffic to new revision (canary)
        run: |
          new_revision="${{ steps.latest_revision.outputs.name }}"
          previous_revision="${{ steps.previous_revision.outputs.name }}"

          if [ -z "$previous_revision" ]; then
            echo "No previous revision found — first deployment, sending 100% traffic to new revision"
            az containerapp ingress traffic set \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --revision-weight "${new_revision}=100"
          else
            echo "Canary: 20% to $new_revision, 80% to $previous_revision"
            az containerapp ingress traffic set \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --revision-weight "${new_revision}=20" "${previous_revision}=80"
          fi

      - name: Smoke test at canary traffic (20%)
        run: |
          url="https://$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)"
          echo "Testing $url"
          for i in {1..5}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Canary smoke test passed — HTTP $status"
              exit 0
            fi
            echo "Attempt $i — HTTP $status, retrying in 15s"
            sleep 15
          done
          echo "Canary smoke test failed after 5 attempts"
          exit 1

      - name: Promote new revision to 100%
        run: |
          new_revision="${{ steps.latest_revision.outputs.name }}"
          az containerapp ingress traffic set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --revision-weight "${new_revision}=100"

  promote:
    name: Promote image to prod ACR
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    env:
      SOURCE_ACR: acrnginxacadev.azurecr.io
      TARGET_ACR: acrnginxacaprod
      IMAGE_NAME: nginx-aca/web

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Import image from dev ACR to prod ACR
        run: |
          az acr import \
            --name $TARGET_ACR \
            --source $SOURCE_ACR/$IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
            --image $IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
            --force

  deploy-prod:
    name: Deploy — prod
    needs: [build, promote]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    env:
      APP_NAME: ca-nginx-aca-prod
      RESOURCE_GROUP: rg-main-nginx-aca-prod
      ACR_SERVER: acrnginxacaprod.azurecr.io
      IMAGE_NAME: nginx-aca/web

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current active revision
        id: previous_revision
        run: |
          previous=$(az containerapp revision list \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "[?properties.trafficWeight > \`0\`].name" -o tsv | head -n1)
          echo "name=$previous" >> $GITHUB_OUTPUT
          echo "Previous active revision: $previous"

      - name: Configure ACR registry on Container App
        run: |
          az containerapp registry set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --server $ACR_SERVER \
            --identity system

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_SERVER/$IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
            --revision-suffix ${{ needs.build.outputs.image_tag }}

      - name: Get latest revision name
        id: latest_revision
        run: |
          revision=$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.latestRevisionName" -o tsv)
          echo "name=$revision" >> $GITHUB_OUTPUT
          echo "Latest revision: $revision"

      - name: Get new revision FQDN
        id: revision_fqdn
        run: |
          fqdn=$(az containerapp revision show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --revision ${{ steps.latest_revision.outputs.name }} \
            --query "properties.fqdn" -o tsv)
          echo "fqdn=$fqdn" >> $GITHUB_OUTPUT

      - name: Wait for revision to start
        run: sleep 60

      - name: Smoke test new revision
        run: |
          url="https://${{ steps.revision_fqdn.outputs.fqdn }}"
          echo "Testing $url"
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Smoke test passed — HTTP $status"
              exit 0
            fi
            echo "Attempt $i — HTTP $status, retrying in 30s"
            sleep 30
          done
          echo "Smoke test failed after 10 attempts"
          exit 1

      - name: Shift 20% traffic to new revision (canary)
        run: |
          new_revision="${{ steps.latest_revision.outputs.name }}"
          previous_revision="${{ steps.previous_revision.outputs.name }}"

          if [ -z "$previous_revision" ]; then
            echo "No previous revision found — first deployment, sending 100% traffic to new revision"
            az containerapp ingress traffic set \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --revision-weight "${new_revision}=100"
          else
            echo "Canary: 20% to $new_revision, 80% to $previous_revision"
            az containerapp ingress traffic set \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --revision-weight "${new_revision}=20" "${previous_revision}=80"
          fi

      - name: Smoke test at canary traffic (20%)
        run: |
          url="https://$(az containerapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)"
          echo "Testing $url"
          for i in {1..5}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Canary smoke test passed — HTTP $status"
              exit 0
            fi
            echo "Attempt $i — HTTP $status, retrying in 15s"
            sleep 15
          done
          echo "Canary smoke test failed after 5 attempts"
          exit 1

      - name: Promote new revision to 100%
        run: |
          new_revision="${{ steps.latest_revision.outputs.name }}"
          az containerapp ingress traffic set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --revision-weight "${new_revision}=100"