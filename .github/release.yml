changelog:
  exclude:
    labels:
      - ignore-for-release

  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement

    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix

    - title: 🏗️ Infrastructure
      labels:
        - infrastructure
        - terraform

    - title: 🔧 CI/CD
      labels:
        - ci
        - pipeline

    - title: 📦 Other Changes
      labels:
        - "*"
